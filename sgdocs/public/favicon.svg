<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d17"/>
      <stop offset="100%" style="stop-color:#1e2138"/>
    </linearGradient>
    <linearGradient id="gate-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#800020"/>
      <stop offset="50%" style="stop-color:#a01030"/>
      <stop offset="100%" style="stop-color:#c02040"/>
    </linearGradient>
    <linearGradient id="inner-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a01030"/>
      <stop offset="100%" style="stop-color:#800020"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg-gradient)"/>
  
  <!-- Outer Ring (Stargate) -->
  <circle cx="50" cy="50" r="35" stroke="url(#gate-gradient)" stroke-width="8" fill="none"/>
  
  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="28" stroke="url(#gate-gradient)" stroke-width="4" fill="none" opacity="0.7"/>
  
  <!-- Event Horizon (Center) -->
  <circle cx="50" cy="50" r="18" fill="url(#inner-gradient)" opacity="0.8">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Chevron (Top) -->
  <path d="M50 12 L55 20 L50 17 L45 20 Z" fill="url(#gate-gradient)"/>
  
  <!-- Decorative Points -->
  <circle cx="50" cy="15" r="3" fill="url(#gate-gradient)"/>
  <circle cx="85" cy="50" r="3" fill="url(#gate-gradient)"/>
  <circle cx="50" cy="85" r="3" fill="url(#gate-gradient)"/>
  <circle cx="15" cy="50" r="3" fill="url(#gate-gradient)"/>
  
  <!-- Stars -->
  <circle cx="25" cy="25" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="75" cy="25" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="25" cy="75" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="75" cy="75" r="1.5" fill="#ffffff" opacity="0.5"/>
</svg>
